services:
  sagoconsole:
    build: .
    container_name: sagoconsole
    restart: unless-stopped
    ports:
      - "8120:8120"
    environment:
      - TZ=America/Los_Angeles
      - NODE_ENV=production
    env_file:
      - .env
    volumes:
      - /docker-storage/services/sagoconsole/data:/data
      # Tdarr cleanup: source (NVMe processing) and output (DAS media)
      - /docker-storage/processing/arr-tv:/tdarr-source/arr-tv
      - /docker-storage/processing/arr-movies:/tdarr-source/arr-movies
      - /docker-storage/processing/arr-adult:/tdarr-source/arr-adult
      - /nas/media/arr-tv:/tdarr-output/arr-tv
      - /nas/media/arr-movies:/tdarr-output/arr-movies
      - /nas/media/arr-adult:/tdarr-output/arr-adult
    extra_hosts:
      - "host.docker.internal:172.16.0.1"
    networks:
      - monitoring_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8120/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.centurylinklabs.watchtower.monitor-only=true"

networks:
  monitoring_net:
    external: true
